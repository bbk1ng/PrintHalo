                  height: 100%
                  bg_opa: TRANSP
                  border_width: 0
                  clickable: true
                  on_press:
                    - lvgl.page.previous:
              - obj:
                  align: RIGHT_MID
                  width: 40%
                  height: 100%
                  bg_opa: TRANSP
                  border_width: 0
                  clickable: true
                  on_press:
                    - lvgl.page.next:
              - label:
                  align: CENTER
                  y: -37%
                  text: "AMS"
                  text_color: 0xFFFFFF
              - label:
                  id: ams_humidity_label
                  align: CENTER
                  x: -24%
                  y: -24%
                  text: "H --%"
                  text_color: 0xDDDDDD
              - label:
                  id: ams_temp_label
                  align: CENTER
                  x: 24%
                  y: -24%
                  text: "T --C"
                  text_color: 0xDDDDDD
              - obj:
                  id: ams_slot_1_box
