interval:
  - interval: 50ms
    then:
      - lambda: |-
          auto lower = [](std::string s) {
            for (auto &c : s) c = (char)tolower((unsigned char)c);
            return s;
          };
          auto lerp8 = [](uint8_t a, uint8_t b, float t) -> uint8_t {
            return (uint8_t) lroundf(a + (b - a) * t);
          };
          auto pulse_between = [&](uint32_t lo, uint32_t hi, uint32_t period_ms) -> uint32_t {
            const float pi = 3.14159265f;
            float t = 0.5f + 0.5f * sinf((millis() % period_ms) * 2.0f * pi / period_ms);
            uint8_t lr = (lo >> 16) & 0xFF, lg = (lo >> 8) & 0xFF, lb = lo & 0xFF;
            uint8_t hr = (hi >> 16) & 0xFF, hg = (hi >> 8) & 0xFF, hb = hi & 0xFF;
            return ((uint32_t) lerp8(lr, hr, t) << 16) | ((uint32_t) lerp8(lg, hg, t) << 8) | lerp8(lb, hb, t);
          };
          auto set_ring = [&](uint32_t main_col, uint32_t ind_col) {
            lv_obj_set_style_arc_color(id(progress_arc), lv_color_hex(main_col), LV_PART_MAIN);
            lv_obj_set_style_arc_color(id(progress_arc), lv_color_hex(ind_col), LV_PART_INDICATOR);
          };
          auto step_to = [](uint8_t cur, uint8_t tgt, uint8_t step) -> uint8_t {
            int d = (int) tgt - (int) cur;
            if (d > 0) return (uint8_t)(cur + std::min(d, (int) step));
            if (d < 0) return (uint8_t)(cur - std::min(-d, (int) step));
            return cur;
          };

          std::string stage = id(current_stage).has_state() ? lower(id(current_stage).state) : "";
          std::string ps = id(print_status).has_state() ? lower(id(print_status).state) : "";
          int prog = id(print_progress).has_state() ? (int) id(print_progress).state : id(last_prog);
          if (prog < 0) prog = 0;
          if (prog > 100) prog = 100;

          bool filament = stage.find("filament_loading") != std::string::npos ||
                          stage.find("filament_unloading") != std::string::npos;
          if (filament) {
            const bool loading = stage.find("filament_loading") != std::string::npos;
            const uint32_t fill_ms = 2000U;
            uint32_t t = millis() % (fill_ms + 300U);
            int value = loading ? 100 : 0;
            if (t < fill_ms) {
              float f = (float)t / (float)fill_ms;
              value = loading ? (int)lroundf(f * 100.0f) : (int)lroundf((1.0f - f) * 100.0f);
            }
            set_ring(0x101010, 0xFFD54F);
            lv_arc_set_value(id(progress_arc), value);
            return;
          }

          if (ps.find("fail") != std::string::npos || ps.find("error") != std::string::npos) {
            uint32_t c = pulse_between(0x220000, 0xFF3333, 1600);
            set_ring(c, c);
            return;
          }
          if (ps.find("pause") != std::string::npos) {
            uint32_t c = pulse_between(0x3A3100, 0xFFD54F, 1400);
            set_ring(0x101010, c);
            return;
          }
          if (stage.find("heatbed_preheating") != std::string::npos ||
              stage.find("nozzle_preheating") != std::string::npos ||
              stage.find("preheat") != std::string::npos) {
            uint32_t c = pulse_between(0x3A1F00, 0xFFA500, 1400);
            set_ring(c, c);
            return;
          }
          if (stage.find("auto_bed_leveling") != std::string::npos ||
              stage.find("bed_level") != std::string::npos) {
            uint32_t c = pulse_between(0x220033, 0xAA66FF, 1400);
            set_ring(c, c);
            return;
          }
          bool done = (ps.find("finish") != std::string::npos && stage.find("idle") != std::string::npos && prog == 100);
          if (done) {
            set_ring(0x00BFFF, 0x00BFFF);
            return;
          }
          bool idleish = stage.find("idle") != std::string::npos || stage.find("offline") != std::string::npos;
          if (idleish && !id(print_active)) {
            set_ring(0x404040, 0x404040);
            return;
          }

          uint32_t c_now = id(ui_col_now);
          uint32_t c_tgt = id(ui_col_target);
          uint8_t r = step_to((c_now >> 16) & 0xFF, (c_tgt >> 16) & 0xFF, 25);
          uint8_t g = step_to((c_now >> 8) & 0xFF, (c_tgt >> 8) & 0xFF, 25);
          uint8_t b = step_to(c_now & 0xFF, c_tgt & 0xFF, 25);
          uint32_t mixed = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
          id(ui_col_now) = mixed;
          set_ring(0x101010, mixed);

  - interval: 1s
    then:
      - lambda: |-
          auto lower = [](std::string s) {
            for (auto &c : s) c = (char)tolower((unsigned char)c);
            return s;
          };
          std::string ps = id(print_status).has_state() ? lower(id(print_status).state) : "";
          std::string stage = id(current_stage).has_state() ? lower(id(current_stage).state) : "";
          int p = id(print_progress).has_state() ? (int) id(print_progress).state : id(last_prog);
          if (p < 0) p = 0;
          if (p > 100) p = 100;
          if (id(print_progress).has_state()) id(last_prog) = p;

          bool done = ps.find("finish") != std::string::npos &&
                      (stage.find("idle") != std::string::npos || stage.empty()) &&
                      p >= 100;
          bool failed = ps.find("fail") != std::string::npos || ps.find("error") != std::string::npos;
          bool running_like = ps.find("running") != std::string::npos ||
                              ps.find("printing") != std::string::npos ||
                              ps.find("prepare") != std::string::npos ||
                              ps.find("pause") != std::string::npos;
          bool stage_active = stage.find("printing") != std::string::npos ||
                              stage.find("preheat") != std::string::npos ||
                              stage.find("heatbed") != std::string::npos ||
                              stage.find("nozzle_preheating") != std::string::npos ||
                              stage.find("bed_level") != std::string::npos ||
                              stage.find("filament_loading") != std::string::npos ||
                              stage.find("filament_unloading") != std::string::npos;
          id(print_active) = !done && !failed && (running_like || stage_active || (p > 0 && p < 100));
          bool should_dim = !id(print_active);
          if (id(display_dimmed) != should_dim) id(display_dimmed) = should_dim;

          uint32_t target = 0x00FF00;
          if (ps.find("pause") != std::string::npos) target = 0xFFD54F;
          else if (failed) target = 0xFF3333;
          else if (done) target = 0x00BFFF;
          else if (stage.find("preheat") != std::string::npos || stage.find("heatbed") != std::string::npos) target = 0xFFA500;
          else if (stage.find("bed_level") != std::string::npos) target = 0xAA66FF;
          else if (!id(print_active)) target = 0x666666;
          id(ui_col_target) = target;
      - script.execute: apply_backlight
      - lvgl.arc.update:
          id: progress_arc
          value: !lambda |-
            if (id(print_progress).has_state()) {
              int p = (int) id(print_progress).state;
              if (p < 0) p = 0;
              if (p > 100) p = 100;
              return p;
            }
            return id(last_prog);
      - lvgl.label.update:
          id: progress_label
          text: !lambda |-
            int p = id(print_progress).has_state() ? (int) id(print_progress).state : id(last_prog);
            if (p < 0) p = 0;
            if (p > 100) p = 100;
            char buf[12];
            snprintf(buf, sizeof(buf), "%d%%", p);
            return std::string(buf);
      - lvgl.label.update:
          id: status_label
          text: !lambda |-
            auto lower = [](std::string s) { for (auto &c : s) c = (char)tolower((unsigned char)c); return s; };
            std::string ps = id(print_status).has_state() ? lower(id(print_status).state) : "";
            if (ps.find("fail") != std::string::npos || ps.find("error") != std::string::npos) return std::string("error");
            if (ps.find("pause") != std::string::npos) return std::string("paused");
            if (ps.find("prepare") != std::string::npos) return std::string("preparing");
            if (ps.find("running") != std::string::npos || ps.find("printing") != std::string::npos) return std::string("printing");
            if (ps.find("finish") != std::string::npos) return std::string("finished");
            return ps.empty() ? std::string("idle") : ps.substr(0, 18);
      - lvgl.label.update:
          id: stage_label
          text: !lambda |-
            std::string s = id(current_stage).has_state() ? id(current_stage).state : "waiting";
            for (auto &c : s) if (c == '_' || c == '-') c = ' ';
            return s.substr(0, 22);
      - lvgl.label.update:
          id: remaining_label
          text: !lambda |-
            if (!id(remaining_time).has_state()) return std::string("--m");
            int minutes = (int) id(remaining_time).state;
            if (minutes < 0) minutes = 0;
            int h = minutes / 60;
            int m = minutes % 60;
            char buf[20];
            if (h > 0) snprintf(buf, sizeof(buf), "%dh %dm", h, m);
            else snprintf(buf, sizeof(buf), "%dm", m);
