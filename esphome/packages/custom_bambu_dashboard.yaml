  - interval: 200ms
    then:
      - lambda: |-
          auto read16 = [](uint8_t lo, uint8_t hi) -> int16_t {
            return (int16_t)((uint16_t)lo | ((uint16_t)hi << 8));
          };
          auto xl = id(qmi8658).read_byte(0x35);
          auto xh = id(qmi8658).read_byte(0x36);
          auto yl = id(qmi8658).read_byte(0x37);
          auto yh = id(qmi8658).read_byte(0x38);
          auto zl = id(qmi8658).read_byte(0x39);
          auto zh = id(qmi8658).read_byte(0x3A);
          if (!xl.has_value() || !xh.has_value() || !yl.has_value() || !yh.has_value() ||
              !zl.has_value() || !zh.has_value()) return;

          int16_t ax = read16(xl.value(), xh.value());
          int16_t ay = read16(yl.value(), yh.value());
          int16_t az = read16(zl.value(), zh.value());
          int absx = abs((int)ax), absy = abs((int)ay), absz = abs((int)az);
          int dominant = std::max(absx, absy);
          if (dominant < 2000 || dominant < (absz / 3)) return;

          int candidate;
          if (absy >= absx) {
            candidate = ay >= 0 ? 0 : 180;
          } else {
            candidate = ax >= 0 ? 90 : 270;
          }

          static int pending = -1;
          static uint32_t pending_since = 0;
          if (candidate == id(display_rotation)) {
            pending = -1;
            return;
          }
          if (candidate != pending) {
            pending = candidate;
            pending_since = millis();
            return;
          }
          if (millis() - pending_since >= 800) {
            id(requested_rotation) = candidate;
            pending = -1;
          }
      - if:
          condition:
            lambda: return id(requested_rotation) != id(display_rotation);
          then:
            - if:
                condition:
                  lambda: return id(requested_rotation) == 0;
                then:
                  - lvgl.display.set_rotation: 0
            - if:
                condition:
                  lambda: return id(requested_rotation) == 90;
                then:
                  - lvgl.display.set_rotation: 90
            - if:
                condition:
                  lambda: return id(requested_rotation) == 180;
                then:
                  - lvgl.display.set_rotation: 180
            - if:
                condition:
                  lambda: return id(requested_rotation) == 270;
                then:
                  - lvgl.display.set_rotation: 270
            - lambda: id(display_rotation) = id(requested_rotation);
