substitutions:
  bambulab_printer: YOUR_PRINTER_ENTITY
  screen_size: "320"
  display_width: "${screen_size}"
  display_height: "${screen_size}"
  ring_size: "260"
  ring_width: "20"
  brightness_default: "70"

globals:
  - id: configured_brightness
    type: float
    restore_value: yes
    initial_value: "${brightness_default}"
  - id: display_dimmed
    type: bool
    restore_value: no
    initial_value: "false"
  - id: print_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: ui_col_now
    type: uint32_t
    restore_value: no
    initial_value: "0x00FF00"
  - id: ui_col_target
    type: uint32_t
    restore_value: no
    initial_value: "0x00FF00"
  - id: last_prog
    type: int
    restore_value: no
    initial_value: "0"
  - id: display_rotation
    type: int
    restore_value: no
    initial_value: "0"
  - id: requested_rotation
    type: int
    restore_value: no
    initial_value: "0"

script:
  - id: apply_backlight
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda |-
            float level = id(configured_brightness) / 100.0f;
            if (id(display_dimmed)) level *= 0.10f;
            if (level < 0.01f) level = 0.01f;
            if (level > 1.0f) level = 1.0f;
            return level;

number:
  - platform: template
    name: "Display Brightness"
    id: brightness_control
    min_value: 10
    max_value: 100
    step: 5
    initial_value: ${brightness_default}
    restore_value: true
    optimistic: true
    on_value:
      then:
        - lambda: id(configured_brightness) = x;
        - script.execute: apply_backlight

sensor:
  - platform: homeassistant
    id: print_progress
    entity_id: sensor.${bambulab_printer}_print_progress
    internal: true
    filters:
      - throttle: 1s
  - platform: homeassistant
    id: nozzle_temp
    entity_id: sensor.${bambulab_printer}_nozzle_temperature
    internal: true
  - platform: homeassistant
    id: bed_temp
    entity_id: sensor.${bambulab_printer}_bed_temperature
    internal: true
  - platform: homeassistant
    id: remaining_time
    entity_id: sensor.${bambulab_printer}_remaining_time
    internal: true
  - platform: homeassistant
    id: current_layer
    entity_id: sensor.${bambulab_printer}_current_layer
    internal: true
  - platform: homeassistant
    id: total_layer
    entity_id: sensor.${bambulab_printer}_total_layer_count
    internal: true
  - platform: homeassistant
    id: ams_humidity
    entity_id: sensor.${bambulab_printer}_ams_1_humidity
    internal: true
  - platform: homeassistant
    id: ams_temp
    entity_id: sensor.${bambulab_printer}_ams_1_temperature
    internal: true

text_sensor:
  - platform: homeassistant
    id: print_status
    entity_id: sensor.${bambulab_printer}_print_status
    internal: true
    on_value:
      then:
        - if:
            condition:
              lambda: |-
                std::string s = x;
                for (auto &c : s) c = (char)tolower((unsigned char)c);
                return s.find("running") != std::string::npos ||
                       s.find("printing") != std::string::npos ||
                       s.find("prepare") != std::string::npos;
            then:
              - lvgl.page.show:
                  id: page_status
  - platform: homeassistant
    id: current_stage
    entity_id: sensor.${bambulab_printer}_current_stage
    internal: true

  - platform: homeassistant
    id: ams_tray_1
    entity_id: sensor.${bambulab_printer}_ams_1_tray_1
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: ams_slot_1_label
            text: !lambda return x.substr(0, 6);
  - platform: homeassistant
    id: ams_tray_2
    entity_id: sensor.${bambulab_printer}_ams_1_tray_2
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: ams_slot_2_label
            text: !lambda return x.substr(0, 6);
  - platform: homeassistant
    id: ams_tray_3
    entity_id: sensor.${bambulab_printer}_ams_1_tray_3
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: ams_slot_3_label
            text: !lambda return x.substr(0, 6);
  - platform: homeassistant
    id: ams_tray_4
    entity_id: sensor.${bambulab_printer}_ams_1_tray_4
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: ams_slot_4_label
            text: !lambda return x.substr(0, 6);

  - platform: homeassistant
    id: ams_tray_1_color
    entity_id: sensor.${bambulab_printer}_ams_1_tray_1
    attribute: color
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string c = x;
            if (!c.empty() && c[0] == '#') c.erase(0, 1);
            if (c.rfind("0x", 0) == 0 || c.rfind("0X", 0) == 0) c.erase(0, 2);
            uint32_t rgb = strtoul(c.c_str(), nullptr, 16);
            uint8_t r = (rgb >> 16) & 0xFF, g = (rgb >> 8) & 0xFF, b = rgb & 0xFF;
            uint32_t text = ((r * 299 + g * 587 + b * 114) / 1000) > 180 ? 0x111111 : 0xFFFFFF;
            lv_obj_set_style_bg_color(id(ams_slot_1_box), lv_color_hex(rgb), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(ams_slot_1_label), lv_color_hex(text), LV_PART_MAIN);
  - platform: homeassistant
    id: ams_tray_2_color
    entity_id: sensor.${bambulab_printer}_ams_1_tray_2
    attribute: color
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string c = x;
            if (!c.empty() && c[0] == '#') c.erase(0, 1);
            if (c.rfind("0x", 0) == 0 || c.rfind("0X", 0) == 0) c.erase(0, 2);
            uint32_t rgb = strtoul(c.c_str(), nullptr, 16);
            uint8_t r = (rgb >> 16) & 0xFF, g = (rgb >> 8) & 0xFF, b = rgb & 0xFF;
            uint32_t text = ((r * 299 + g * 587 + b * 114) / 1000) > 180 ? 0x111111 : 0xFFFFFF;
            lv_obj_set_style_bg_color(id(ams_slot_2_box), lv_color_hex(rgb), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(ams_slot_2_label), lv_color_hex(text), LV_PART_MAIN);
  - platform: homeassistant
    id: ams_tray_3_color
    entity_id: sensor.${bambulab_printer}_ams_1_tray_3
    attribute: color
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string c = x;
            if (!c.empty() && c[0] == '#') c.erase(0, 1);
            if (c.rfind("0x", 0) == 0 || c.rfind("0X", 0) == 0) c.erase(0, 2);
            uint32_t rgb = strtoul(c.c_str(), nullptr, 16);
            uint8_t r = (rgb >> 16) & 0xFF, g = (rgb >> 8) & 0xFF, b = rgb & 0xFF;
            uint32_t text = ((r * 299 + g * 587 + b * 114) / 1000) > 180 ? 0x111111 : 0xFFFFFF;
            lv_obj_set_style_bg_color(id(ams_slot_3_box), lv_color_hex(rgb), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(ams_slot_3_label), lv_color_hex(text), LV_PART_MAIN);
  - platform: homeassistant
    id: ams_tray_4_color
    entity_id: sensor.${bambulab_printer}_ams_1_tray_4
    attribute: color
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string c = x;
            if (!c.empty() && c[0] == '#') c.erase(0, 1);
            if (c.rfind("0x", 0) == 0 || c.rfind("0X", 0) == 0) c.erase(0, 2);
            uint32_t rgb = strtoul(c.c_str(), nullptr, 16);
            uint8_t r = (rgb >> 16) & 0xFF, g = (rgb >> 8) & 0xFF, b = rgb & 0xFF;
            uint32_t text = ((r * 299 + g * 587 + b * 114) / 1000) > 180 ? 0x111111 : 0xFFFFFF;
            lv_obj_set_style_bg_color(id(ams_slot_4_box), lv_color_hex(rgb), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(ams_slot_4_label), lv_color_hex(text), LV_PART_MAIN);

lvgl:
  id: lvgl_id
  color_depth: 16
  bg_color: 0x000000
  displays:
    - round_display
  touchscreens:
    - touchscreen_id: touch_screen
  page_wrap: true
  pages:
    - id: page_status
      bg_color: 0x000000
      scroll_dir: NONE
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            scroll_dir: NONE
            widgets:
              - obj:
                  align: LEFT_MID
                  width: 40%
                  height: 100%
                  bg_opa: TRANSP
                  border_width: 0
                  clickable: true
                  on_press:
                    - lvgl.page.previous:
              - obj:
                  align: RIGHT_MID
                  width: 40%
                  height: 100%
                  bg_opa: TRANSP
                  border_width: 0
                  clickable: true
                  on_press:
                    - lvgl.page.next:
              - arc:
                  id: progress_arc
                  align: CENTER
                  width: ${ring_size}
                  height: ${ring_size}
                  min_value: 0
                  max_value: 100
                  value: 0
                  start_angle: 135
                  end_angle: 45
                  arc_width: ${ring_width}
                  arc_color: 0x242424
                  arc_rounded: true
                  adjustable: false
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  indicator:
                    arc_width: ${ring_width}
                    arc_color: 0x666666
                    arc_rounded: true
              - label:
                  id: progress_label
                  align: CENTER
                  y: -18%
                  text: "--%"
                  text_color: 0xFFFFFF
              - label:
                  id: status_label
                  align: CENTER
                  y: -5%
                  text: "idle"
                  text_color: 0xAAAAAA
              - label:
                  id: stage_label
                  align: CENTER
                  y: 8%
                  text: "waiting"
                  text_color: 0xDDDDDD
              - label:
                  id: layer_label
                  align: CENTER
                  y: 21%
                  text: "-- / --"
                  text_color: 0xDDDDDD
              - label:
                  id: remaining_label
                  align: CENTER
                  y: 33%
                  text: "--m"
                  text_color: 0x87CEEB
              - label:
                  id: nozzle_label
                  align: CENTER
                  x: -22%
                  y: 43%
                  text: "Noz --C"
                  text_color: 0xFFFFFF
              - label:
                  id: bed_label
                  align: CENTER
                  x: 22%
                  y: 43%
                  text: "Bed --C"
                  text_color: 0xFFFFFF

    - id: page_ams
      bg_color: 0x000000
      scroll_dir: NONE
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            scroll_dir: NONE
            widgets:
              - obj:
                  align: LEFT_MID
