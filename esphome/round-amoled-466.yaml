substitutions:
  name: bambu-round-amoled
  friendly_name: Bambu Round Dashboard 466
  bambulab_printer: !secret bambulab_printer
  screen_size: "466"
  display_width: "466"
  display_height: "466"
  ring_size: "466"
  ring_width: "24"
  rotation_offset: "180"
  brightness_default: "70"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.9.0
  name_add_mac_suffix: false
  on_boot:
    priority: -100
    then:
      - script.execute: apply_backlight
      - lambda: |-
          id(qmi8658).write_byte(0x02, 0x60);
          id(qmi8658).write_byte(0x03, 0x04);
          id(qmi8658).write_byte(0x08, 0x01);

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

wifi:
  ap:
    ssid: ${friendly_name}

captive_portal:

psram:
  mode: octal
  speed: 80MHz

spi:
  - id: qspi_bus
    type: quad
    clk_pin: GPIO10
    data_pins: [GPIO11, GPIO12, GPIO13, GPIO14]

i2c:
  - id: i2c_bus
    sda: GPIO47
    scl: GPIO48
    scan: true
    frequency: 400kHz

i2c_device:
  - id: qmi8658
    i2c_id: i2c_bus
    address: 0x6B

touchscreen:
  # FT3168 at default 0x38; absent from boot I2C scan because the scan runs
  # before GPIO42 (AMOLED_EN) powers its rail. 0x51 on the bus is the RTC.
  - platform: ft63x6
    id: touch_screen
    i2c_id: i2c_bus
    display: round_display
    update_interval: 50ms

display:
  - platform: mipi_spi
    model: CO5300
    id: round_display
    bus_mode: quad
    cs_pin: GPIO9
    reset_pin: GPIO21
    enable_pin: GPIO42
    dimensions:
      width: ${display_width}
      height: ${display_height}
    color_depth: 16
    invert_colors: false
    auto_clear_enabled: false
    update_interval: never

packages:
  dashboard: !include packages/custom_bambu_dashboard.yaml
