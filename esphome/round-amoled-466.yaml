substitutions:
  name: bambu-round-amoled
  friendly_name: Bambu Round Dashboard 466
  bambulab_printer: YOUR_PRINTER_ENTITY
  screen_size: "466"
  display_width: "466"
  display_height: "466"
  ring_size: "386"
  ring_width: "28"
  brightness_default: "70"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.9.0
  name_add_mac_suffix: false
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda return id(configured_brightness) / 100.0f;
      - lambda: |-
          id(qmi8658).write_byte(0x02, 0x60);
          id(qmi8658).write_byte(0x03, 0x04);
          id(qmi8658).write_byte(0x08, 0x01);

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

wifi:
  ap:
    ssid: ${friendly_name}

captive_portal:

psram:
  mode: octal
  speed: 80MHz

spi:
  - id: qspi_bus
    type: quad
    interface: spi3
    clk_pin: GPIO10
    data_pins: [GPIO11, GPIO12, GPIO13, GPIO14]

i2c:
  - id: i2c_bus
    sda: GPIO47
    scl: GPIO48
    scan: true
    frequency: 400kHz

i2c_device:
  - id: qmi8658
    i2c_id: i2c_bus
    address: 0x6B

touchscreen:
  - platform: ft63x6
    id: touch_screen
    i2c_id: i2c_bus
    address: 0x38
    update_interval: 30ms

display:
  - platform: mipi_spi
    model: CO5300
    id: round_display
    bus_mode: quad
    cs_pin: GPIO9
    reset_pin: GPIO21
    dimensions:
      width: ${display_width}
      height: ${display_height}
    data_rate: 80000000
    spi_mode: MODE0
    invert_colors: false
    auto_clear_enabled: false
    update_interval: never

output:
  - platform: ledc
    pin: GPIO2
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    id: display_backlight
    name: "Display Backlight"
    restore_mode: RESTORE_DEFAULT_ON

packages:
  dashboard: !include packages/custom_bambu_dashboard.yaml
