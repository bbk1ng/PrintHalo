substitutions:
  name: bambu-round-gc9a01a
  friendly_name: Bambu Round Dashboard 240
  bambulab_printer: YOUR_PRINTER_ENTITY
  screen_size: "240"
  display_width: "240"
  display_height: "240"
  ring_size: "200"
  ring_width: "16"
  brightness_default: "70"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.9.0
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda return id(configured_brightness) / 100.0f;
      - lambda: |-
          id(qmi8658).write_byte(0x02, 0x60);
          id(qmi8658).write_byte(0x03, 0x04);
          id(qmi8658).write_byte(0x08, 0x01);

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  level: INFO
  baud_rate: 0

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

wifi:
  ap:
    ssid: ${friendly_name}

captive_portal:

psram:
  mode: quad
  speed: 80MHz

spi:
  - id: spi_bus
    clk_pin: GPIO10
    mosi_pin: GPIO11
    miso_pin: GPIO12

i2c:
  - id: i2c_bus
    sda: GPIO6
    scl: GPIO7
    scan: true
    frequency: 400kHz

i2c_device:
  - id: qmi8658
    i2c_id: i2c_bus
    address: 0x6B

touchscreen:
  - platform: cst816
    id: touch_screen
    interrupt_pin: GPIO5
    reset_pin: GPIO13
    i2c_id: i2c_bus

display:
  - platform: mipi_spi
    model: GC9A01A
    id: round_display
    spi_id: spi_bus
    cs_pin: GPIO9
    dc_pin: GPIO8
    reset_pin: GPIO14
    dimensions:
      width: ${display_width}
      height: ${display_height}
    invert_colors: true
    auto_clear_enabled: false
    update_interval: never

output:
  - platform: ledc
    pin: GPIO2
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    id: display_backlight
    name: "Display Backlight"
    restore_mode: RESTORE_DEFAULT_ON

packages:
  dashboard: !include packages/custom_bambu_dashboard.yaml
